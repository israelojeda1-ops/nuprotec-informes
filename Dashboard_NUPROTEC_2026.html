<!DOCTYPE html>
<html lang='es'><head><meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Dashboard NUPROTEC</title>
<style>
:root{
  --azul:#1B2A4E;--naranja:#C44918;--bg:#F3F4F6;
  --white:#fff;--border:#E5E7EB;--muted:#9CA3AF;--text:#111827;--accent:#1D4ED8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:13px;height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--azul);padding:.6rem 1.25rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h1{color:#fff;font-size:15px;font-weight:600}
.topbar span{color:#93A4C4;font-size:11px}
.toolbar{background:var(--white);border-bottom:1px solid var(--border);padding:.4rem 1.25rem;display:flex;align-items:center;gap:1rem;flex-shrink:0}
.toolbar label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
select{border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:12px;cursor:pointer}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:.75rem 1.25rem;flex-shrink:0}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:.6rem .9rem;border-left:3px solid var(--naranja)}
.kpi-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.kpi-val{font-size:18px;font-weight:700;color:var(--azul);margin:2px 0}
.kpi-sub{font-size:11px;color:var(--muted)}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:1rem;padding:0 1.25rem .75rem;flex:1;min-height:0}
.card{background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
.card-hdr{font-size:10px;font-weight:500;color:var(--muted);padding:.4rem .75rem;border-bottom:1px solid var(--border);background:#FAFAFA;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0}
.tbl-wrap{overflow-y:auto;flex:1}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:500;color:var(--muted);text-align:center;padding:5px 7px;border-bottom:1px solid var(--border);text-transform:uppercase;white-space:nowrap;background:#FAFAFA;position:sticky;top:0;z-index:1}
th:first-child{text-align:left}
td{text-align:center;padding:5px 7px;border-bottom:1px solid #F3F4F6;white-space:nowrap}
td:first-child{text-align:left;font-weight:500}
.dr:hover td{background:#F0F9FF}
td.clk{cursor:pointer}
td.clk:hover{background:#DBEAFE!important}
.tot-row{background:#F9FAFB!important;border-top:2px solid var(--border);font-weight:700}
.panel-placeholder{color:var(--muted);font-size:12px;padding:.75rem}
.ptable{width:100%;border-collapse:collapse;font-size:11px}
.ptable th{font-size:10px;color:var(--muted);padding:3px 6px;text-align:center;border-bottom:1px solid var(--border);text-transform:uppercase;white-space:nowrap;background:#FAFAFA;position:sticky;top:0;z-index:1}
.ptable th.l{text-align:left}
.ptable td{padding:3px 6px;border-bottom:1px solid #F3F4F6;text-align:center;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.ptable td.l{text-align:left}
.ptable td.r{text-align:right;font-variant-numeric:tabular-nums}
.ptable tr:hover td{background:#EFF6FF}
.tag{display:inline-block;font-size:10px;padding:1px 5px;border-radius:3px;font-weight:500}
.sub-row td{background:#F9FAFB;font-weight:600}
.tot-est td{background:#E5E7EB;font-weight:700}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:1rem}
.modal.open{display:flex}
.modal-box{background:var(--white);border-radius:10px;width:100%;max-width:600px;max-height:85vh;display:flex;flex-direction:column}
.modal-hdr{padding:.75rem 1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:#FAFAFA;flex-shrink:0}
.modal-hdr span{font-size:13px;font-weight:600;color:var(--azul)}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)}
.modal-body{padding:.75rem;overflow-y:auto;flex:1}
@media(max-width:700px){
  body{height:auto}
  .layout{grid-template-columns:1fr}
  .kpis{grid-template-columns:1fr 1fr}
  .kpis .kpi:last-child{grid-column:span 2}
  .tbl-wrap{max-height:300px}
}
</style></head><body>

<div class='topbar'>
  <h1 id='titulo'>Dashboard Comercial — NUPROTEC</h1>
  <span id='generado'></span>
</div>

<div class='toolbar'>
  <label>Mes</label>
  <select id='sel' onchange='render()'></select>
</div>

<div class='kpis' id='kpis'></div>

<div class='layout'>
  <div class='card'>
    <div class='card-hdr'>Cotizaciones por vendedor — clic en celda para ver detalle</div>
    <div class='tbl-wrap'>
      <table><thead><tr>
        <th>Vendedor</th>
        <th>Pend N°</th><th>Pend Monto</th>
        <th>NV N°</th><th>NV Monto</th>
        <th>Perd N°</th><th>Perd Monto</th>
        <th>Nula N°</th>
        <th>Total N°</th><th>Total Monto</th><th>Conv.</th>
      </tr></thead>
      <tbody id='tbody'></tbody>
    </table>
  </div>
  <div class='card'>
    <div class='card-hdr' id='panel-hdr'>Selecciona una celda</div>
    <div class='tbl-wrap' id='panel-body'>
      <p class='panel-placeholder'>Haz clic en cualquier número de la tabla izquierda.</p>
    </div>
  </div>
</div>

<div class='modal' id='modal' onclick='bgClose(event)'>
  <div class='modal-box'>
    <div class='modal-hdr'>
      <span id='mtitle'>Detalle</span>
      <button class='modal-close' onclick='closeModal()'>×</button>
    </div>
    <div class='modal-body' id='mbody'></div>
  </div>
</div>

var CE={"Pendiente": ["#FFF3CD", "#856404"], "En NV": ["#D1ECF1", "#0C5460"], "Perdida": ["#F8D7DA", "#721C24"], "Nula": ["#E2E3E5", "#383D41"]};

function clp(v){return '$'+Math.round(v).toLocaleString('es-CL');}

function tagG(g){
  var c=CG[g]||['#F3F4F6','#6B7280'];
  return '<span class="tag" style="background:'+c[0]+';color:'+c[1]+'">'+g+'</span>';
}

function isMobile(){return window.innerWidth<=700;}

function buildPanel(cotis,estado){
  if(!cotis||!cotis.length) return '<p class="panel-placeholder">Sin registros.</p>';
  var h='<table class="ptable"><thead><tr>'
    +'<th>N°</th><th>Fecha</th><th class="l">Cliente</th>'
    +'<th class="l">Contacto</th><th>Canal</th><th>Grupo</th><th class="r">Monto</th>'
    +'</tr></thead><tbody>';
  var totalEst=0;
  cotis.forEach(function(c){
    var ng=c.g.length;
    totalEst+=c.t;
    c.g.forEach(function(g,i){
      h+='<tr>';
      if(i===0){
        var rs=ng>1?' rowspan="'+ng+'"':'';
        h+='<td'+rs+' style="font-weight:600">'+c.num+'</td>';
        h+='<td'+rs+' style="color:#9CA3AF">'+c.f+'</td>';
        h+='<td'+rs+' class="l" title="'+c.cl+'">'+c.cl+'</td>';
        h+='<td'+rs+' class="l" style="color:#9CA3AF">'+c.co+'</td>';
        h+='<td'+rs+' style="color:#9CA3AF">'+c.ca+'</td>';
      }
      h+='<td>'+tagG(g.g)+'</td>';
      h+='<td class="r">'+clp(g.m)+'</td>';
      h+='</tr>';
    });
    if(ng>1){
      h+='<tr class="sub-row"><td colspan="5"></td>'
        +'<td style="font-size:10px;color:#6B7280;padding:2px 6px">Subtotal '+c.num+'</td>'
        +'<td class="r" style="padding:2px 6px">'+clp(c.t)+'</td></tr>';
    }
  });
  h+='<tr class="tot-est"><td colspan="5"></td>'
    +'<td style="padding:4px 6px;font-size:11px">Total '+estado+'</td>'
    +'<td class="r" style="padding:4px 6px">'+clp(totalEst)+'</td></tr>';
  h+='</tbody></table>';
  return h;
}

function showPanel(mes,vend,estado){
  var d=DET[mes]&&DET[mes][vend]&&DET[mes][vend][estado];
  var cotis=d?d.cotis:[];
  var n=d?d.n:0; var monto=d?d.monto:0;
  var label=vend+' — '+estado+' ('+n+' · '+clp(monto)+')';
  var html=buildPanel(cotis,estado);
  if(isMobile()){
    document.getElementById('mtitle').textContent=label;
    document.getElementById('mbody').innerHTML=html;
    document.getElementById('modal').classList.add('open');
  }else{
    document.getElementById('panel-hdr').textContent=label;
    document.getElementById('panel-body').innerHTML=html;
  }
}

function closeModal(){document.getElementById('modal').classList.remove('open');}
function bgClose(e){if(e.target===document.getElementById('modal'))closeModal();}

function render(){
  var mes=document.getElementById('sel').value;
  var datos=RES[mes]||[];
  var tn=0,tm=0,en=0,pn=0,pm=0;
  datos.forEach(function(r){tn+=r.tn;tm+=r.tm;en+=r.en;pn+=r.pn;pm+=r.pm;});
  var pct=tn?Math.round(en/tn*1000)/10:0;

  document.getElementById('kpis').innerHTML=
    '<div class="kpi"><div class="kpi-lbl">Cotizaciones</div><div class="kpi-val">'+tn+'</div><div class="kpi-sub">'+clp(tm)+' neto</div></div>'
    +'<div class="kpi"><div class="kpi-lbl">Convertidas NV</div><div class="kpi-val">'+en+'</div><div class="kpi-sub">'+pct+'% conversión</div></div>'
    +'<div class="kpi"><div class="kpi-lbl">Pendientes</div><div class="kpi-val">'+pn+'</div><div class="kpi-sub">'+clp(pm)+' en cartera</div></div>';

  var tpn=0,tpm=0,ten=0,tem=0,trn=0,trm=0,tnn=0,ttn=0,ttm=0;
  var rows='';
  datos.forEach(function(r){
    tpn+=r.pn;tpm+=r.pm;ten+=r.en;tem+=r.em;
    trn+=r.rn;trm+=r.rm;tnn+=r.nn;ttn+=r.tn;ttm+=r.tm;

    function nc(n,m,est){
      var bg=CE[est]?CE[est][0]:'#fff';
      if(n===0) return '<td style="color:#D1D5DB;text-align:center">—</td><td style="color:#D1D5DB;text-align:center">—</td>';
      return '<td class="clk" onclick="showPanel(''+mes+'',''+r.v+'',''+est+'')"'
        +' onmouseover="this.style.background=''+bg+''" onmouseout="this.style.background=''"'
        +' style="text-align:right">'+n+'</td>'
        +'<td class="clk" onclick="showPanel(''+mes+'',''+r.v+'',''+est+'')"'
        +' onmouseover="this.style.background=''+bg+''" onmouseout="this.style.background=''"'
        +' style="text-align:right;font-variant-numeric:tabular-nums">'+clp(m)+'</td>';
    }

    rows+='<tr class="dr">'
      +'<td>'+r.v+'</td>'
      +nc(r.pn,r.pm,'Pendiente')
      +nc(r.en,r.em,'En NV')
      +nc(r.rn,r.rm,'Perdida')
      +'<td style="text-align:center;color:#9CA3AF">'+r.nn+'</td>'
      +'<td style="text-align:right;font-weight:600">'+r.tn+'</td>'
      +'<td style="text-align:right;font-weight:600;font-variant-numeric:tabular-nums">'+clp(r.tm)+'</td>'
      +'<td style="text-align:right;color:var(--accent);font-weight:600">'+r.pc+'%</td>'
      +'</tr>';
  });

  var tpct=ttn?Math.round(ten/ttn*1000)/10:0;
  rows+='<tr class="tot-row">'
    +'<td>Total</td>'
    +'<td style="text-align:right">'+tpn+'</td><td style="text-align:right">'+clp(tpm)+'</td>'
    +'<td style="text-align:right">'+ten+'</td><td style="text-align:right">'+clp(tem)+'</td>'
    +'<td style="text-align:right">'+trn+'</td><td style="text-align:right">'+clp(trm)+'</td>'
    +'<td style="text-align:center">'+tnn+'</td>'
    +'<td style="text-align:right">'+ttn+'</td><td style="text-align:right">'+clp(ttm)+'</td>'
    +'<td style="text-align:right;color:var(--accent)">'+tpct+'%</td>'
    +'</tr>';

  document.getElementById('tbody').innerHTML=rows;
  document.getElementById('panel-hdr').textContent='Selecciona una celda';
  document.getElementById('panel-body').innerHTML='<p class="panel-placeholder">Haz clic en cualquier número de la tabla izquierda.</p>';
}

// Inicializar selector y título
var MESES_ES={1:'Enero',2:'Febrero',3:'Marzo',4:'Abril',5:'Mayo',6:'Junio',
              7:'Julio',8:'Agosto',9:'Septiembre',10:'Octubre',11:'Noviembre',12:'Diciembre'};
var sel=document.getElementById('sel');
for(var m=1;m<=12;m++){
  var o=document.createElement('option');
  o.value=m; o.textContent=MESES_ES[m];
  if(m===new Date().getMonth()+1) o.selected=true;
  sel.appendChild(o);
}
document.getElementById('generado').textContent='Generado '+new Date().toLocaleDateString('es-CL');
render();
</script>
